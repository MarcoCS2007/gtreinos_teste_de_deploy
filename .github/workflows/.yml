name: Django CI Pipeline

# 1. GATILHOS: Quando a máquina deve ligar?
on:
  pull_request:
    branches: [ "main", "develop" ]
  # Opcional: rodar em pushes diretos para a main (caso alguém burle o PR)
  push:
    branches: [ "main" ]

# 2. ISOLAMENTO: O que vamos executar?
jobs:
  lint-and-test:
    name: Code Quality
    runs-on: ubuntu-latest # Usar a imagem Linux mais recente é mais barato e rápido

    steps:
      # Passo 1: O GitHub Actions começa vazio. Precisamos clonar seu repositório.
      - name: Checkout Code
        uses: actions/checkout@v4

      # Passo 2: Instalar o Python.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # TRUQUE DE PERFORMANCE: Fazer cache das dependências do pip.
          # Isso evita baixar os pacotes do Django toda vez que a CI rodar.
          cache: 'pip'

      # Passo 3: Preparar o ambiente.
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Em um projeto real, você usaria requirements.txt ou Pipfile/Poetry
          pip install ruff 

      # Passo 4: O Julgamento. O comando abaixo falha a CI se houver erros.
      - name: Run Ruff Linter
        # Roda o linter no modo "check" (sem tentar arrumar, apenas relata o erro)
        run: ruff check .

      - name: Run Ruff Formatter Check
        # Verifica se alguém esqueceu de rodar o formatador localmente
        run: ruff format --check .