# O bloco upstream define os servidores back-end para os quais o Nginx enviará as requisições.
# 'web' é o nome do serviço no seu docker-compose.yml e 8000 é a porta exposta pelo Gunicorn.
upstream django_gunicorn {
    server web:8000;
}

server {
    # Nginx escuta na porta 80 (HTTP padrão)
    listen 80;
    
    # Substitua pelo seu domínio ou IP da máquina, ou deixe _ para capturar tudo
    server_name _; 

    # Ignora logs de favicon que não foi encontrado
    location = /favicon.ico { 
        access_log off; 
        log_not_found off; 
    }

    # ROTEAMENTO DE ESTÁTICOS
    # Quando o navegador pedir algo em /static/, o Nginx vai procurar dentro do volume compartilhado
    location /static/ {
        alias /app/static_root/;
    }

    # ROTEAMENTO DE MÍDIA (uploads de usuários - opcional, se seu app tiver)
    location /media/ {
        alias /app/media/;
    }

    # ROTEAMENTO DINÂMICO (Proxy Reverso para o Gunicorn)
    # Qualquer requisição que não for estático/mídia cai aqui
    location / {
        proxy_pass http://django_gunicorn;
        
        # Repassa os cabeçalhos originais para o Django saber o IP real do cliente
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}